retargeting:
  type: DexPilot
  # dex-only retarget variant: PIP/DIP lower bound pinned to 0 (thumb upper 0)
  # so the optimizer can't drive fingers backward. Base dg5f_left.urdf is the
  # true hardware description; only dex uses this constrained copy.
  urdf_path: dg5f_left_retarget.urdf

  # All 20 revolute joints, in DG5F command order (finger 1=thumb .. 5=pinky,
  # joint 1..4 proximal->distal). Output qpos is reordered to this order in dex.py.
  target_joint_names: [
    'lj_dg_1_1', 'lj_dg_1_2', 'lj_dg_1_3', 'lj_dg_1_4',
    'lj_dg_2_1', 'lj_dg_2_2', 'lj_dg_2_3', 'lj_dg_2_4',
    'lj_dg_3_1', 'lj_dg_3_2', 'lj_dg_3_3', 'lj_dg_3_4',
    'lj_dg_4_1', 'lj_dg_4_2', 'lj_dg_4_3', 'lj_dg_4_4',
    'lj_dg_5_1', 'lj_dg_5_2', 'lj_dg_5_3', 'lj_dg_5_4',
  ]

  # Robot wrist/palm root and the five fingertips (thumb, index, middle, ring, pinky).
  wrist_link_name: "ll_dg_palm"
  finger_tip_link_names: [ "ll_dg_1_tip", "ll_dg_2_tip", "ll_dg_3_tip", "ll_dg_4_tip", "ll_dg_5_tip" ]

  # Human->robot hand size ratio. Hardware-tuned (2026-07-07); was 1.2. GUI's
  # Dex Tuning box can override this live -- this is just the starting value.
  scaling_factor: 1.1

  # Smaller alpha = stronger low-pass smoothing (more latency). Hardware-tuned
  # (2026-07-07); was 0.2.
  low_pass_alpha: 0.1

  # EXPERIMENTAL (manusdelto only, not ported to teleop): DexPilot's pinch-prior
  # distance thresholds (library defaults 0.03/0.05). Between escape_dist and
  # project_dist, a fingertip pair (e.g. thumb-index) gets pulled together more
  # aggressively than plain least-squares would. This is NOT a direct fix for
  # thumb joint 1/2 usage -- scaling_factor/low_pass_alpha don't touch this at
  # all, and this only fires when two tips are already fairly close (pinch-like
  # poses), not general open-hand fold. Tightened here as a first bench
  # experiment; revert to defaults (comment out both lines) if it doesn't help
  # or overshoots on other fingers.
  project_dist: 0.02
  escape_dist: 0.03
