retargeting:
  type: vector
  # dex-only retarget variant (PIP/DIP lower bound pinned to 0). See the
  # matching dexpilot config for the rationale.
  urdf_path: dg5f_right_retarget.urdf

  # All 20 revolute joints in DG5F command order; output qpos is reordered to
  # this order in dex.py.
  target_joint_names: [
    'rj_dg_1_1', 'rj_dg_1_2', 'rj_dg_1_3', 'rj_dg_1_4',
    'rj_dg_2_1', 'rj_dg_2_2', 'rj_dg_2_3', 'rj_dg_2_4',
    'rj_dg_3_1', 'rj_dg_3_2', 'rj_dg_3_3', 'rj_dg_3_4',
    'rj_dg_4_1', 'rj_dg_4_2', 'rj_dg_4_3', 'rj_dg_4_4',
    'rj_dg_5_1', 'rj_dg_5_2', 'rj_dg_5_3', 'rj_dg_5_4',
  ]

  # Vector families:
  #   A. palm -> fingertip  (tip position, like DexPilot)          [5 vectors]
  #   B. MCP  -> DIP         (distal-segment DIRECTION, fingers)    [4 vectors]
  #   B'. thumb rl_dg_1_2 -> rl_dg_1_3 (thumb PROXIMAL direction)  [1 vector]
  #   C. palm -> thumb rl_dg_1_2  (thumb BASE direction)           [1 vector]
  #   D. thumb rl_dg_1_3 -> rl_dg_1_tip (thumb DISTAL direction)   [2 vectors, weighted]
  #
  # C is the abduction/opposition fix: it spans palm -> rl_dg_1_2 (past joints
  # 1_1 abduction and 1_2 opposition), so matching the human wrist->thumb-MCP
  # direction REQUIRES those two joints -- fixes the "L-shape" base.
  #
  # B'/D are the curl-distribution fix. Originally the thumb's B vector spanned
  # rl_dg_1_2 -> rl_dg_1_4 (BOTH curl joints 1_3+1_4) but matched the human
  # PROXIMAL segment (2->3), so it pinned the combined direction to a straight-
  # ish proximal pose and FOUGHT any distal bend -- all curl piled into 1_3 (PIP
  # over-bends, DIP straight). Split into: B' spans rl_dg_1_2 -> rl_dg_1_3 (joint
  # 1_3 only, human proximal 2->3) and D spans rl_dg_1_3 -> rl_dg_1_tip (joint
  # 1_4 only, human distal 3->4). Now each curl joint owns exactly one direction
  # target with a matching human segment, so they stop fighting. D is duplicated
  # (x2) to weight the distal bend harder, since 1_4 was very reluctant.
  #
  # EXPERIMENTAL, manusdelto only. Library has no per-vector weight; duplicate an
  # entry across all four lists to weight it. To dial the distal bend up/down,
  # add/remove a D copy; to revert a family, delete its entries.
  target_origin_link_names:
    - "rl_dg_palm"
    - "rl_dg_palm"
    - "rl_dg_palm"
    - "rl_dg_palm"
    - "rl_dg_palm"
    - "rl_dg_1_2"
    - "rl_dg_2_2"
    - "rl_dg_3_2"
    - "rl_dg_4_2"
    - "rl_dg_5_2"
    - "rl_dg_palm"      # C: thumb base
    - "rl_dg_1_3"       # D: thumb distal
    - "rl_dg_1_3"       # D: thumb distal (weight x2)
  target_task_link_names:
    - "rl_dg_1_tip"
    - "rl_dg_2_tip"
    - "rl_dg_3_tip"
    - "rl_dg_4_tip"
    - "rl_dg_5_tip"
    - "rl_dg_1_3"       # B': thumb proximal (was rl_dg_1_4)
    - "rl_dg_2_4"
    - "rl_dg_3_4"
    - "rl_dg_4_4"
    - "rl_dg_5_4"
    - "rl_dg_1_2"       # C: thumb base
    - "rl_dg_1_tip"     # D: thumb distal
    - "rl_dg_1_tip"     # D: thumb distal (weight x2)
  # Human (MANO) keypoint indices for each vector: [origins; tasks].
  #   origins: wrist x5, thumb MCP / finger PIP knuckles x5, wrist (C), thumb PIP (D x2)
  #   tasks:   tip x5,   thumb PIP / finger DIP joints x5,   thumb MCP (C), thumb tip (D x2)
  target_link_human_indices:
    - [0, 0, 0, 0, 0, 2, 6, 10, 14, 18, 0, 3, 3]
    - [4, 8, 12, 16, 20, 3, 7, 11, 15, 19, 2, 4, 4]

  scaling_factor: 1.2
  low_pass_alpha: 0.2
