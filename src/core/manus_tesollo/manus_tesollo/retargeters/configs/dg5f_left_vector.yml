retargeting:
  type: vector
  # dex-only retarget variant (PIP/DIP lower bound pinned to 0). See the
  # matching dexpilot config for the rationale.
  urdf_path: dg5f_left_retarget.urdf

  # All 20 revolute joints in DG5F command order; output qpos is reordered to
  # this order in dex.py.
  target_joint_names: [
    'lj_dg_1_1', 'lj_dg_1_2', 'lj_dg_1_3', 'lj_dg_1_4',
    'lj_dg_2_1', 'lj_dg_2_2', 'lj_dg_2_3', 'lj_dg_2_4',
    'lj_dg_3_1', 'lj_dg_3_2', 'lj_dg_3_3', 'lj_dg_3_4',
    'lj_dg_4_1', 'lj_dg_4_2', 'lj_dg_4_3', 'lj_dg_4_4',
    'lj_dg_5_1', 'lj_dg_5_2', 'lj_dg_5_3', 'lj_dg_5_4',
  ]

  # Two vector families per finger:
  #   A. palm -> fingertip  (tip position, like DexPilot)
  #   B. MCP  -> DIP         (proximal-segment DIRECTION) — this is what makes
  #      the thumb/fingers actually FOLD instead of just reaching the tip, so
  #      thumb opposition looks natural (DexPilot only constrains the tip).
  target_origin_link_names:
    - "ll_dg_palm"
    - "ll_dg_palm"
    - "ll_dg_palm"
    - "ll_dg_palm"
    - "ll_dg_palm"
    - "ll_dg_1_2"
    - "ll_dg_2_2"
    - "ll_dg_3_2"
    - "ll_dg_4_2"
    - "ll_dg_5_2"
  target_task_link_names:
    - "ll_dg_1_tip"
    - "ll_dg_2_tip"
    - "ll_dg_3_tip"
    - "ll_dg_4_tip"
    - "ll_dg_5_tip"
    - "ll_dg_1_4"
    - "ll_dg_2_4"
    - "ll_dg_3_4"
    - "ll_dg_4_4"
    - "ll_dg_5_4"
  # Human (MANO) keypoint indices for each vector: [origins; tasks].
  #   origins: wrist x5, then thumb MCP / finger PIP knuckles
  #   tasks:   tip x5,   then thumb IP / finger DIP joints
  target_link_human_indices:
    - [0, 0, 0, 0, 0, 2, 6, 10, 14, 18]
    - [4, 8, 12, 16, 20, 3, 7, 11, 15, 19]

  scaling_factor: 1.2
  low_pass_alpha: 0.2
